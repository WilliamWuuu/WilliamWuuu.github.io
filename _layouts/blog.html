<!DOCTYPE html>
<html lang="en">
<!-- Template: https://github.com/luost26/academic-homepage -->
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>{{ page.title }} - {{ site.data.profile.navbar_name }}</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/css/bootstrap.min.css" integrity="sha512-P5MgMn1jBN01asBgU0z60Qk4QxiXo86+wlFahKrsQf37c9cro517WzVSPPV1tDKzhku2iJ2FVgL67wG03SGnNA==" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.9.1/css/academicons.min.css" integrity="sha512-b1ASx0WHgVFL5ZQhTgiPWX+68KjS38Jk87jg7pe+qC7q9YkEtFq0z7xCglv7qGIs/68d3mAp+StfC8WKC5SSAg==" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,300;1,400;1,700;1,900&family=Fira+Sans:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ '/assets/css/global.css' | relative_url }}">
</head>
<body class="bg-light d-flex flex-column min-vh-100" {{ page.body_attr }}>
    {% include navbar.html %}
    <main class="flex-grow-1">
        <div class="container-lg">
            <div class="row justify-content-center">
                <div class="col-12 col-xl-9">
                    <article class="bg-white shadow-sm rounded-xl p-4 mb-4">
                        <header class="mb-4">
                            <h1 class="display-4 mb-3">{{ page.title }}</h1>
                            <div class="text-muted mb-3">
                                <i class="fas fa-calendar-alt"></i> {{ page.date | date: "%B %d, %Y" }}
                                {% if page.tags %}
                                    <span class="ml-3">
                                        <i class="fas fa-tags"></i>
                                        {% for tag in page.tags %}
                                            <span class="badge badge-light">{{ tag }}</span>
                                        {% endfor %}
                                    </span>
                                {% endif %}
                            </div>
                        </header>

                        <div class="blog-content">
                            {{ content }}
                        </div>
                    </article>

                    <div class="text-center mb-4">
                        <a href="{{ '/blogs' | relative_url }}" class="btn btn-outline-primary">
                            <i class="fas fa-arrow-left"></i> Back to All Blogs
                        </a>
                    </div>
                </div>
                <!-- Table of Contents sidebar -->
                <div class="col-xl-3 d-none d-xl-block">
                    <nav class="blog-toc sticky-top" id="blog-toc">
                        <h6 class="blog-toc-title">Table of Contents</h6>
                        <ul class="blog-toc-list" id="blog-toc-list"></ul>
                    </nav>
                </div>
            </div>
        </div>
    </main>
    {% include footer.html %}

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery.lazy/1.7.9/jquery.lazy.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/js/bootstrap.min.js" integrity="sha512-XKa9Hemdy1Ui3KSGgJdgMyYlUg1gM+QhL6cnlyTe2qzMCYm4nAZ1PsVerQzTTXzonUR+dmswHqgJPuwCq1MaAg==" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/github-buttons/2.14.2/buttons.min.js"></script>
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            // Initialize KaTeX for math rendering with equation auto-numbering
            if (typeof renderMathInElement !== 'undefined') {
                renderMathInElement(document.body, {
                    delimiters: [
                        {left: '$$', right: '$$', display: true},
                        {left: '$', right: '$', display: false},
                        {left: '\\(', right: '\\)', display: false},
                        {left: '\\[', right: '\\]', display: true}
                    ],
                    throwOnError: false,
                    strict: false,
                    trust: true
                });
            }

            // Re-enable equation tags that KaTeX renders
            document.querySelectorAll('.katex-display .tag').forEach(function(el) {
                el.style.removeProperty('display');
            });


            // Auto-generate Table of Contents
            var blogContent = document.querySelector('.blog-content');
            var tocList = document.getElementById('blog-toc-list');
            if (blogContent && tocList) {
                var headings = blogContent.querySelectorAll('h1, h2, h3, h4, h5, h6');
                headings.forEach(function(heading, index) {
                    // Ensure each heading has an id
                    if (!heading.id) {
                        heading.id = 'heading-' + index;
                    }
                    var level = parseInt(heading.tagName.charAt(1));
                    var li = document.createElement('li');
                    li.className = 'blog-toc-item blog-toc-level-' + level;
                    var a = document.createElement('a');
                    a.href = '#' + heading.id;
                    a.className = 'blog-toc-link';
                    a.textContent = heading.textContent;
                    a.addEventListener('click', function(e) {
                        e.preventDefault();
                        var target = document.getElementById(heading.id);
                        if (target) {
                            var offset = 80; // account for fixed navbar
                            var top = target.getBoundingClientRect().top + window.pageYOffset - offset;
                            window.scrollTo({top: top, behavior: 'smooth'});
                        }
                    });
                    li.appendChild(a);
                    tocList.appendChild(li);
                });

                // Hide TOC if no headings found
                if (headings.length === 0) {
                    var tocNav = document.getElementById('blog-toc');
                    if (tocNav) tocNav.style.display = 'none';
                }

                // Highlight current section on scroll
                var tocLinks = tocList.querySelectorAll('.blog-toc-link');
                function updateActiveToc() {
                    var scrollPos = window.scrollY + 100;
                    var current = null;
                    headings.forEach(function(heading) {
                        if (heading.offsetTop <= scrollPos) {
                            current = heading;
                        }
                    });
                    tocLinks.forEach(function(link) {
                        link.classList.remove('active');
                    });
                    if (current) {
                        var activeLink = tocList.querySelector('a[href="#' + current.id + '"]');
                        if (activeLink) activeLink.classList.add('active');
                    }
                }
                window.addEventListener('scroll', updateActiveToc);
                updateActiveToc();
            }
        })
    </script>
    <script src="{{ '/assets/js/common.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/bubble_visual_hash.js' | relative_url }}"></script>
    <script src="{{ '/assets/js/semantic_scholar_citation_count.js' | relative_url }}"></script>
</body>
</html>
